<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SLAM - Super Lazy Achievement Manager</title>
    <meta name="description" content="The intuitive, modern, and powerful achievement manager for Steam." />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }
      body {
        margin: 0;
        padding: 0;
        background-color: #0f1115;
        color: #fff;
        font-family: 'Inter', sans-serif;
        line-height: 1.6;
        background-image: radial-gradient(circle at top right, #1a2a42 0%, #0f1115 40%);
        min-height: 100vh;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 20px;
      }
      header {
        text-align: center;
        margin-bottom: 60px;
        animation: fadeInDown 0.8s ease-out;
      }
      h1 {
        font-size: 3.5rem;
        font-weight: 800;
        margin-bottom: 0;
        line-height: 1;
        background: linear-gradient(135deg, #fff 0%, #a0a5b5 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .subtitle {
        font-size: 1.2rem;
        color: #a0a5b5;
        font-weight: 300;
      }
      .card {
        background-color: rgba(32, 35, 42, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: 10px;
        padding: 10px 10px 5px;
        margin-bottom: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      img {
        width: 100%;
        border-radius: 5px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>SLAM Tutorial</h1>
        <div class="subtitle">The intuitive, modern, and powerful achievement manager for Steam.</div>
      </header>
      <div class="card">
        <img src="1.png" alt="SLAM Tutorial Step 1" />
      </div>
      <div class="card">
        <img src="2.png" alt="SLAM Tutorial Step 1" />
      </div>
      <div class="card">
        <img src="3.png" alt="SLAM Tutorial Step 3" />
      </div>
      <div class="card">
        <img src="4.png" alt="SLAM Tutorial Step 4" />
      </div>
      <div class="card">
        <img src="5.png" alt="SLAM Tutorial Step 5" />
      </div>
      <div class="card">
        <img src="6.png" alt="SLAM Tutorial Step 6" />
      </div>
      <div class="card">
        <img src="7.png" alt="SLAM Tutorial Step 7" />
      </div>
      <div class="card">
        <img src="8.png" alt="SLAM Tutorial Step 8" />
      </div>
      <div class="card">
        <img src="9.png" alt="SLAM Tutorial Step 9" />
      </div>
    </div>
  </body>
</html>
